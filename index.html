<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>DIED — Doran Iberian Energy Dashboard</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0d10;
    color: #e8ece8;
    font-family: system-ui, -apple-system, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    text-align: center;
    padding: 40px;
  }
  h1 { font-size: 2.5rem; letter-spacing: -0.02em; margin-bottom: 8px; }
  h1 em { font-style: italic; font-weight: 300; color: #d4ff4d; }
  p { color: #6b7470; max-width: 500px; line-height: 1.6; margin-top: 12px; }
  .status { margin-top: 24px; font-family: monospace; font-size: 13px; color: #6b7470; }
  .status span { color: #d4ff4d; }
  #meta-info { margin-top: 12px; font-family: monospace; font-size: 12px; color: #4a5560; }
</style>
</head>
<body>
  <h1>Doran <em>Iberian</em> Energy Dashboard</h1>
  <p>The full dashboard is coming soon. This page confirms GitHub Pages is serving correctly and data fetching is operational.</p>
  <div class="status">Status: <span id="status-text">checking...</span></div>
  <div id="meta-info"></div>

  <script>
    fetch('data/_meta.json')
      .then(r => r.json())
      .then(meta => {
        const el = document.getElementById('status-text');
        const info = document.getElementById('meta-info');
        if (meta.last_refresh) {
          el.textContent = `operational — ${meta.indicators_fetched} indicators`;
          el.style.color = '#d4ff4d';
          info.textContent = `Last refresh: ${meta.last_refresh} (${meta.mode})`;
        } else {
          el.textContent = 'awaiting first data fetch';
          el.style.color = '#ff8c42';
          info.textContent = 'Run the GitHub Action manually or wait for the schedule.';
        }
      })
      .catch(() => {
        document.getElementById('status-text').textContent = 'no data yet';
      });
  </script>
</body>
</html>
