name: Fetch ESIOS data (daily capacity)

on:
  schedule:
    # Once daily at 07:00 CET (05:00 UTC)
    - cron: '0 5 * * *'
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch daily indicators
        env:
          ESIOS_TOKEN: ${{ secrets.ESIOS_TOKEN }}
        run: python fetch_data.py --mode daily

      - name: Commit and push data
        run: |
          git config user.name "DIED Bot"
          git config user.email "bot@died.dashboard"
          git add data/
          git diff --staged --quiet || git commit -m "data: daily capacity refresh $(date -u +'%Y-%m-%d')"
          git push
